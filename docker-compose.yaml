services:

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    container_name: holonet-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: holonet
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: holonet-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/holonet?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_SECRET: ${REFRESH_SECRET}
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: holonet-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data: